<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGenius Hub | Discover Top AI Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .card { transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: #3b82f6; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm p-5 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-blue-600">AIGenius Hub</h1>
        <div class="flex gap-3 items-center">
            <a href="#" class="text-gray-600 font-medium text-sm hidden md:block">Submit Tool</a>
            <a href="#premium" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-sm">Unlock Pro</a>
        </div>
    </nav>

    <!-- Hero & Search -->
    <section class="text-center py-16 px-4 bg-blue-600 text-white">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Find the Best AI Tools</h2>
        <p class="text-blue-100 mb-8 max-w-xl mx-auto">From video generation to research and education. All in one directory.</p>
        <input type="text" id="searchInput" onkeyup="filterTools()" placeholder="Search tools (e.g. Video, Research, Gemini...)" 
               class="w-full max-w-xl p-4 rounded-2xl text-black outline-none shadow-lg">
    </section>

    <!-- Tools Grid -->
    <section class="max-w-7xl mx-auto py-12 px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="toolsContainer">
        <!-- JavaScript will populate this area -->
    </section>

    <script>
        // All your keywords integrated into tools
        const aiTools = [
            { name: "ChatGPT", cat: "Like ChatGPT", tag: "Free", desc: "Advanced AI chatbot for writing, coding, and research." },
            { name: "Gemini Pro", cat: "AI Mode / Studio", tag: "Free", desc: "Google's most capable AI model for multi-modal tasks." },
            { name: "Runway ML", cat: "Video Generation", tag: "Paid", desc: "Create stunning videos using AI text prompts." },
            { name: "Synthesia", cat: "Video Editing", tag: "Premium", desc: "AI avatars for professional video editing." },
            { name: "DALL-E 3", cat: "Image Generation", tag: "Paid", desc: "Generate high-quality AI images from text." },
            { name: "Pictory", cat: "Video Generator Free", tag: "Freemium", desc: "Turn scripts and blog posts into videos automatically." },
            { name: "Zotero AI", cat: "Research / Study", tag: "Free", desc: "AI-powered tool for academic research management." },
            { name: "Beautiful.ai", cat: "Presentation", tag: "Premium", desc: "Generate stunning presentation slides using AI." },
            { name: "ScribeSense", cat: "Education", tag: "Free", desc: "AI tools designed to help students study better." },
            { name: "FaceApp AI", cat: "Face Search / Photo Editor", tag: "Freemium", desc: "Edit photos and perform AI face searches easily." },
            { name: "Midjourney", cat: "Image Generator", tag: "Paid", desc: "The standard for high-end AI image creation." },
            { name: "Flowise", cat: "AI Flow", tag: "Free", desc: "Drag and drop UI to build AI workflows effortlessly." }
        ];

        function renderTools(data) {
            const container = document.getElementById('toolsContainer');
            container.innerHTML = data.map(tool => `
                <div class="card bg-white p-6 rounded-2xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-bold uppercase text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${tool.cat}</span>
                        <span class="text-xs font-bold ${tool.tag === 'Free' ? 'text-green-600' : 'text-yellow-600'}">${tool.tag}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">${tool.name}</h3>
                    <p class="text-gray-500 text-sm mb-5">${tool.desc}</p>
                    <button class="w-full bg-gray-100 hover:bg-blue-600 hover:text-white text-gray-800 py-2 rounded-lg font-bold transition">View Tool</button>
                </div>
            `).join('');
        }

        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = aiTools.filter(t => 
                t.name.toLowerCase().includes(query) || 
                t.cat.toLowerCase().includes(query) || 
                t.desc.toLowerCase().includes(query)
            );
            renderTools(filtered);
        }

        // Load tools initially
        renderTools(aiTools);
    </script>
</body>
</html>
